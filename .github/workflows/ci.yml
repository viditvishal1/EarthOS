name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node scripts/preflight.mjs
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        timeout-minutes: 10

  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
        timeout-minutes: 10
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true
